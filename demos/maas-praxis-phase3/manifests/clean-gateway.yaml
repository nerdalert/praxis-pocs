# Phase 3B: Clean Gateway — no Kuadrant policies
#
# This Gateway has NO AuthPolicy and NO TokenRateLimitPolicy.
# It proves Praxis can operate without any Kuadrant components
# in the request path.
#
# The CLUSTER_DOMAIN placeholder is replaced by deploy-clean-gateway.sh
# at deploy time.
#
# Rollback:
#   oc delete httproute praxis-clean-phase3 -n llm
#   oc delete gateway praxis-clean-gateway -n openshift-ingress

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: praxis-clean-gateway
  namespace: openshift-ingress
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: http
      hostname: praxis-clean.CLUSTER_DOMAIN
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: praxis-clean-phase3
  namespace: llm
spec:
  parentRefs:
    - name: praxis-clean-gateway
      namespace: openshift-ingress
  hostnames:
    - praxis-clean.CLUSTER_DOMAIN
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /praxis-maas
      backendRefs:
        - name: praxis-phase3
          port: 8080
